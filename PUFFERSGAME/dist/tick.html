<body><div id="app"></div>
<script>/* Puffers — pure simulation core (no DOM, deterministic).
 *
 * The "puffer" (souffleur / Bläser) is the period slur for the charlatan who
 * just worked the bellows hoping for gold. Here: too few gnomes, too many
 * bellows, and a lab full of glass that boils over into Rube-Goldberg
 * catastrophe the moment a furnace drifts out of its temperature band.
 *
 * This module is the single source of truth for the RULES. All three genre
 * variants (tick / real-time / pausable) drive THIS exact simulation; they
 * only differ in how they call step(). Keep it free of window/document/canvas
 * so it can be unit-tested under node.
 */
(function (global) {
  'use strict';

  // Seeded RNG (mulberry32) — matches the root project's determinism ethos.
  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6d2b79f5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const clamp = (v, lo, hi) => (v < lo ? lo : v > hi ? hi : v);

  // ---- Tuning (all rates are per real second) -----------------------------
  const T = {
    gnomePump: 19,      // temp/s a fresh gnome adds while jumping the bellows
    homPump: 23,        // homunculus pumps harder...
    windedMult: 0.32,   // ...a winded gnome barely puffs
    staminaMax: 100,
    staminaDrain: 12,   // while pumping
    staminaRefill: 16,  // while resting
    windedRecover: 26,  // stamina above this clears the "winded" flag
    processRate: 7,     // progress/s while temp is inside the band (per furnace override below)
    overFactor: 0.9,    // overheat gained per (degree-over-band) per second
    coolFactor: 22,     // overheat bled off per second when back in band
    quenchTemp: 48,     // a quench drops this much temperature
    quenchOver: 60,     // ...and this much overheat
    quenchCd: 5,        // seconds before a furnace can be quenched again
    cascadeInt: 20,     // lab integrity lost per boil-over
    cascadeIntAcid: 32, // ...worse for the acid retort
    spoil: 42,          // process progress destroyed by a boil-over
    fumeKo: 4.0,        // seconds a gnome is knocked out by fumes
    fumeKoAcid: 5.5,
    spreadOver: 30,     // overheat splashed onto each neighbour
    spreadTemp: 16,     // temp spike splashed onto each neighbour
    boilCool: 46,       // temp lost by the furnace that boiled over
    homLife: 46,        // seconds before a homunculus destabilises and pops
    homPop: 12,         // integrity lost when a homunculus pops
    tempMax: 138,
  };

  // Four furnaces. Ids are also their left-to-right order (neighbours = id±1).
  // Bands, heat-loss and product are grounded in the real apparatus.
  const FURNACE_DEFS = [
    { id: 0, name: 'Alembic',  op: 'Distillation', product: 'Spirit of Wine',
      bandMin: 46, bandMax: 76, heatLoss: 5.5, rate: 7.0, acid: false, cradle: false },
    { id: 1, name: 'Retort',   op: 'Aqua Fortis',  product: 'Aqua Fortis',
      bandMin: 66, bandMax: 86, heatLoss: 6.5, rate: 6.6, acid: true,  cradle: false },
    { id: 2, name: 'Aludel',   op: 'Sublimation',  product: 'Flowers of Sulphur',
      bandMin: 40, bandMax: 64, heatLoss: 5.0, rate: 7.0, acid: false, cradle: false },
    { id: 3, name: 'Cradle',   op: 'Generation',   product: 'Homunculus',
      bandMin: 30, bandMax: 52, heatLoss: 4.0, rate: 5.4, acid: false, cradle: true },
  ];

  const GNOME_NAMES = ['Blort', 'Pib', 'Gnorm', 'Wick', 'Snuff'];
  const HOM_QUIPS = [
    'It looks... judgmental.',
    'It smells of wet dog and ambition.',
    'It blinks too many times.',
    'It is already unionising.',
  ];

  function makeGnome(id, name) {
    return { id, kind: 'gnome', name, furnace: null, stamina: T.staminaMax,
      winded: false, ko: 0 };
  }
  function makeHomunculus(id) {
    return { id, kind: 'homunculus', name: 'Homunculus', furnace: null,
      ko: 0, destabilize: 0 };
  }

  function createState(seed) {
    seed = (seed >>> 0) || 1;
    const rng = mulberry32(seed);
    const furnaces = FURNACE_DEFS.map((d) => ({
      ...d,
      temp: d.bandMin + 2,   // start just inside the band: a grace, then it drifts
      overheat: 0,
      progress: 0,
      done: false,
      quenchCd: 0,
      flash: 0,              // visual boil-over flash timer (render only)
    }));
    const state = {
      seed, rng, t: 0, integrity: 100, status: 'playing',
      furnaces,
      workers: [makeGnome(0, GNOME_NAMES[0]), makeGnome(1, GNOME_NAMES[1])],
      messages: [], homunculiBirthed: 0, nextWorkerId: 2, score: 0, ticks: 0,
    };
    say(state, 'Two gnomes. Four bellows. Keep every furnace in its green band.', 'info');
    return state;
  }

  function say(state, text, tone) {
    state.messages.push({ t: state.t, text, tone: tone || 'info' });
    if (state.messages.length > 7) state.messages.shift();
  }

  // ---- Player actions ------------------------------------------------------
  function assign(state, workerId, furnaceId) {
    if (state.status !== 'playing') return false;
    const w = state.workers.find((x) => x.id === workerId);
    if (!w || w.ko > 0) return false;
    // One worker per bellows: bump whoever is already there back to the bench.
    const prev = state.workers.find((x) => x.furnace === furnaceId && x.id !== workerId);
    if (prev) prev.furnace = null;
    w.furnace = furnaceId;
    return true;
  }
  function unassign(state, workerId) {
    const w = state.workers.find((x) => x.id === workerId);
    if (w) w.furnace = null;
  }
  function quench(state, furnaceId) {
    if (state.status !== 'playing') return false;
    const f = state.furnaces[furnaceId];
    if (!f || f.quenchCd > 0) return false;
    f.temp = clamp(f.temp - T.quenchTemp, 0, T.tempMax);
    f.overheat = clamp(f.overheat - T.quenchOver, 0, 100);
    f.quenchCd = T.quenchCd;
    say(state, `Quench! ${f.name} hisses and settles.`, 'good');
    return true;
  }

  const neighbours = (state, f) =>
    state.furnaces.filter((o) => Math.abs(o.id - f.id) === 1);

  function activePumper(state, furnaceId) {
    return state.workers.find((w) => w.furnace === furnaceId && w.ko <= 0);
  }

  // ---- The simulation ------------------------------------------------------
  // step() sub-steps in small fixed slices so large dt (the tick variant's
  // half-second) stays numerically identical to real-time's per-frame dt.
  function step(state, dt) {
    if (state.status !== 'playing') return state;
    // Sub-step in fixed 1/60 slices so a big dt (the tick variant's 0.5s) is
    // numerically identical to real-time's per-frame dt. Cap only against a
    // pathological jump (e.g. the tab was backgrounded for seconds).
    let remaining = Math.min(dt, 1);
    const H = 1 / 60;
    while (remaining > 1e-6) {
      const h = Math.min(H, remaining);
      stepOnce(state, h);
      remaining -= h;
      if (state.status !== 'playing') break;
    }
    return state;
  }

  function stepOnce(state, h) {
    state.t += h;

    // Workers -------------------------------------------------------------
    const popped = [];
    for (const w of state.workers) {
      if (w.ko > 0) { w.ko = Math.max(0, w.ko - h); continue; }
      if (w.kind === 'gnome') {
        if (w.furnace != null) {
          w.stamina -= T.staminaDrain * h;
          if (w.stamina <= 0) { w.stamina = 0; w.winded = true; }
        } else {
          w.stamina = Math.min(T.staminaMax, w.stamina + T.staminaRefill * h);
          if (w.stamina > T.windedRecover) w.winded = false;
        }
      } else { // homunculus: tireless & fume-immune, but destabilises
        w.destabilize += (100 / T.homLife) * h;
        if (w.destabilize >= 100) popped.push(w);
      }
    }
    for (const w of popped) popHomunculus(state, w);

    // Furnaces ------------------------------------------------------------
    for (const f of state.furnaces) {
      if (f.quenchCd > 0) f.quenchCd = Math.max(0, f.quenchCd - h);
      if (f.flash > 0) f.flash = Math.max(0, f.flash - h);

      const w = activePumper(state, f.id);
      if (w) {
        const p = w.kind === 'homunculus'
          ? T.homPump
          : (w.winded ? T.gnomePump * T.windedMult : T.gnomePump);
        f.temp += p * h;
      }
      f.temp = clamp(f.temp - f.heatLoss * h, 0, T.tempMax);

      // Process advances only inside the band.
      if (!f.done && f.temp >= f.bandMin && f.temp <= f.bandMax) {
        f.progress += f.rate * h;
        if (f.progress >= 100) {
          if (f.cradle) { f.progress = 0; birthHomunculus(state, f); }
          else { f.progress = 100; f.done = true;
            say(state, `${f.name} yields ${f.product}! ✔`, 'good'); }
        }
      }

      // Overheat accrues above the band, cools inside it.
      if (f.temp > f.bandMax) f.overheat += (f.temp - f.bandMax) * T.overFactor * h;
      else f.overheat -= T.coolFactor * h;
      f.overheat = clamp(f.overheat, 0, 100);
      if (f.overheat >= 100) cascade(state, f);
    }

    // Win / lose ----------------------------------------------------------
    if (state.integrity <= 0) {
      state.integrity = 0; state.status = 'lost';
      say(state, 'The whole lab goes up. The puffers flee. 💥', 'bad');
    } else if (state.furnaces.every((f) => f.cradle || f.done)) {
      state.status = 'won';
      state.score = Math.max(0,
        Math.round(state.integrity * 10 - state.t * 2 + state.homunculiBirthed * 40));
      say(state, `The Work is complete! Score ${state.score}. 🏆`, 'good');
    }
  }

  function cascade(state, f) {
    state.integrity -= f.acid ? T.cascadeIntAcid : T.cascadeInt;
    if (!f.done) f.progress = Math.max(0, f.progress - T.spoil);
    const koT = f.acid ? T.fumeKoAcid : T.fumeKo;

    // Fumes throw the gnome off this bellows (homunculi shrug it off).
    const here = activePumper(state, f.id);
    if (here && here.kind === 'gnome') { here.ko = koT; here.furnace = null; }
    if (f.acid) {
      for (const n of neighbours(state, f)) {
        const nw = activePumper(state, n.id);
        if (nw && nw.kind === 'gnome') { nw.ko = koT; nw.furnace = null; }
      }
    }
    // Splash onto the neighbours — the Rube-Goldberg chain.
    for (const n of neighbours(state, f)) {
      n.overheat = Math.min(100, n.overheat + T.spreadOver);
      n.temp = Math.min(T.tempMax, n.temp + T.spreadTemp);
    }
    f.overheat = 0;
    f.temp = Math.max(0, f.temp - T.boilCool);
    f.flash = 0.7;
    say(state, f.acid
      ? `The ${f.name} belches aqua fortis! Fumes everywhere. ☠`
      : `Boil-over at the ${f.name}! Glass everywhere. 💨`, 'bad');
  }

  function birthHomunculus(state, cradle) {
    const w = makeHomunculus(state.nextWorkerId++);
    state.workers.push(w);
    state.homunculiBirthed++;
    const quip = HOM_QUIPS[Math.floor(state.rng() * HOM_QUIPS.length)];
    say(state, `A homunculus quivers into being. ${quip}`, 'good');
  }

  function popHomunculus(state, w) {
    const i = state.workers.indexOf(w);
    if (i >= 0) state.workers.splice(i, 1);
    state.integrity -= T.homPop;
    say(state, 'The homunculus dissolves into a puddle of regret. 🫠', 'bad');
  }

  const API = {
    createState, step, assign, unassign, quench,
    neighbours, activePumper, TUNING: T, FURNACE_DEFS,
  };
  global.PuffersSim = API;
  if (typeof module !== 'undefined' && module.exports) module.exports = API;
})(typeof window !== 'undefined' ? window : globalThis);
</script>
<script>/* Puffers — canvas renderer + layout + hit-testing (browser only).
 * Pure drawing from the sim state; holds no game rules of its own.
 * Logical canvas is 960×600; the shell scales it to fit.
 */
(function (global) {
  'use strict';
  const W = 960, H = 600;
  const CX = [140, 360, 580, 800];      // furnace centres, left→right = id 0..3
  const TEMP_TOP = 150, TEMP_BOT = 300;  // thermometer pixel span
  const BENCH_Y = 60;

  const clamp = (v, a, b) => (v < a ? a : v > b ? b : v);

  function rrect(ctx, x, y, w, h, r) {
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); return; }
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
  }

  // ---- Tiny pixel-art sprite engine ---------------------------------------
  // Sprites are char-grids; each glyph indexes a palette. '.'/' ' = transparent.
  // Drawn with integer coords and no smoothing for a crisp pixel look.
  function drawSprite(ctx, rows, pal, cx, footY, scale) {
    const w = rows[0].length, h = rows.length;
    const x0 = Math.round(cx - (w * scale) / 2);
    const y0 = Math.round(footY - h * scale);
    const s = Math.ceil(scale);
    for (let r = 0; r < h; r++) {
      const row = rows[r];
      for (let c = 0; c < row.length; c++) {
        const g = row[c];
        if (g === '.' || g === ' ') continue;
        const col = pal[g];
        if (!col) continue;
        ctx.fillStyle = col;
        ctx.fillRect(x0 + c * scale | 0, y0 + r * scale | 0, s, s);
      }
    }
  }

  // Classic garden-gnome: big pointy hat, round nose, huge beard, little boots.
  const GNOME = [
    '......HH......',
    '.....HHHH.....',
    '....HHHHHH....',
    '...HHHHHHHH...',
    '..HHHHHHHHHH..',
    '.HHHHHHHHHHHH.',
    '.hhhhhhhhhhhh.',
    '...BBBBBBBB...',
    '..BBEBBBBEBB..',
    '..BBBBNNBBBB..',
    '..BBBNNNNBBB..',
    '.BBBBBBBBBBBB.',
    '.BBBBBBBBBBBB.',
    '..BBBBBBBBBB..',
    '...LL....LL...',
    '...LL....LL...',
  ];
  const GNOME_PAL = { H: '#d8352a', h: '#9e241c', B: '#eef0f0', b: '#c2c6cc',
    N: '#f0b98a', E: '#231017', L: '#4a3728' };
  // Homunculus: same silhouette, sickly-green palette (a glass dome is added over it).
  const HOM_PAL = { H: '#63c873', h: '#39824c', B: '#d6efd6', b: '#a6cfa6',
    N: '#bfe39a', E: '#14300f', L: '#3a5a2a' };

  // ---- Layout: where everything sits (shared by draw + hitTest) -----------
  function layout(state) {
    const tempMax = state.furnaces[0] ? 138 : 138;
    const fur = state.furnaces.map((f) => {
      const cx = CX[f.id];
      return {
        id: f.id, cx,
        column: { x: cx - 96, y: 150, w: 192, h: 300 },     // click = assign here
        quench: { x: cx - 48, y: 500, w: 96, h: 34 },       // click = quench
        bellows: { x: cx, y: 424 },
      };
    });
    // Worker positions.
    const idle = state.workers.filter((w) => w.furnace == null);
    const n = idle.length;
    const workers = state.workers.map((w) => {
      if (w.furnace != null) {
        const bob = w.ko > 0 ? 0 : Math.abs(Math.sin(state.t * 9 + w.id)) * 9;
        return { id: w.id, x: CX[w.furnace], y: 424 - bob, r: 16 };
      }
      const k = idle.indexOf(w);
      const spread = 78;
      const x = W / 2 + (k - (n - 1) / 2) * spread;
      return { id: w.id, x, y: BENCH_Y + 14, r: 16 };
    });
    return { fur, workers, tempMax };
  }

  function hitTest(state, x, y) {
    const L = layout(state);
    for (const w of L.workers) {          // workers first (drawn on top)
      if ((x - w.x) ** 2 + (y - w.y) ** 2 <= (w.r + 6) ** 2)
        return { type: 'worker', id: w.id };
    }
    for (const f of L.fur) {
      const q = f.quench;
      if (x >= q.x && x <= q.x + q.w && y >= q.y && y <= q.y + q.h)
        return { type: 'quench', id: f.id };
    }
    for (const f of L.fur) {
      const c = f.column;
      if (x >= c.x && x <= c.x + c.w && y >= c.y && y <= c.y + c.h)
        return { type: 'assign', id: f.id };
    }
    if (y < 130) return { type: 'bench', id: -1 };  // drop a worker back to rest
    return { type: 'none', id: -1 };
  }

  function tempColor(f) {
    if (f.temp < f.bandMin) return '#5b8def';             // cold blue
    if (f.temp <= f.bandMax) return '#39d353';            // in-band green
    const over = clamp((f.temp - f.bandMax) / 30, 0, 1);
    return over < 0.5 ? '#ffb020' : '#ff3b30';           // hot → danger
  }

  // ---- Draw ----------------------------------------------------------------
  function draw(ctx, state, opts) {
    opts = opts || {};
    const L = layout(state);
    ctx.imageSmoothingEnabled = false; // crisp pixel-art scaling
    ctx.clearRect(0, 0, W, H);

    // Background stone wall + floor.
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#241d24'); g.addColorStop(1, '#141014');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#2b232b'; ctx.fillRect(0, 468, W, H - 468);
    ctx.strokeStyle = '#3a2f3a'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, 468); ctx.lineTo(W, 468); ctx.stroke();

    for (const f of state.furnaces) drawFurnace(ctx, state, f, L);
    for (const w of state.workers) drawWorker(ctx, state, w, L, opts.selected);

    drawHud(ctx, state, opts);
    drawMessages(ctx, state);
    if (state.status !== 'playing') drawBanner(ctx, state);
    else if (opts.paused) drawPaused(ctx);
  }

  function drawFurnace(ctx, state, f, L) {
    const geo = L.fur[f.id];
    const cx = geo.cx;

    // Thermometer.
    const tx = cx - 82, tw = 16;
    rrect(ctx, tx, TEMP_TOP, tw, TEMP_BOT - TEMP_TOP, 8);
    ctx.fillStyle = '#0d0b0d'; ctx.fill();
    const mapY = (temp) => TEMP_BOT - (clamp(temp, 0, L.tempMax) / L.tempMax) * (TEMP_BOT - TEMP_TOP);
    // band zone
    ctx.fillStyle = 'rgba(57,211,83,0.22)';
    const by1 = mapY(f.bandMax), by2 = mapY(f.bandMin);
    ctx.fillRect(tx, by1, tw, by2 - by1);
    // temp fill
    const ty = mapY(f.temp);
    ctx.fillStyle = tempColor(f);
    rrect(ctx, tx, ty, tw, TEMP_BOT - ty, 8); ctx.fill();
    // band edges
    ctx.strokeStyle = 'rgba(57,211,83,0.9)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(tx - 3, by1); ctx.lineTo(tx + tw + 3, by1);
    ctx.moveTo(tx - 3, by2); ctx.lineTo(tx + tw + 3, by2); ctx.stroke();
    // overheat bar (right of thermometer)
    if (f.overheat > 1) {
      const ox = tx + tw + 6;
      ctx.fillStyle = '#3a0000'; ctx.fillRect(ox, TEMP_TOP, 6, TEMP_BOT - TEMP_TOP);
      const oh = (f.overheat / 100) * (TEMP_BOT - TEMP_TOP);
      ctx.fillStyle = f.overheat > 70 ? '#ff2d2d' : '#ff7a1a';
      ctx.fillRect(ox, TEMP_BOT - oh, 6, oh);
    }

    // Apparatus label.
    ctx.textAlign = 'center';
    ctx.fillStyle = f.cradle ? '#c9a6ff' : '#e8dfe8';
    ctx.font = 'bold 16px system-ui, sans-serif';
    ctx.fillText(f.name, cx + 6, 176);
    ctx.fillStyle = '#9a8f9a'; ctx.font = '12px system-ui, sans-serif';
    ctx.fillText(f.op, cx + 6, 193);

    drawApparatus(ctx, f, cx + 6, 232);

    // Progress bar.
    const pbx = cx - 52, pby = 268, pbw = 104;
    rrect(ctx, pbx, pby, pbw, 12, 6); ctx.fillStyle = '#0d0b0d'; ctx.fill();
    ctx.fillStyle = f.done ? '#39d353' : (f.cradle ? '#a06bff' : '#d8b24a');
    rrect(ctx, pbx, pby, pbw * (f.progress / 100), 12, 6); ctx.fill();
    if (f.done) { ctx.fillStyle = '#39d353'; ctx.font = 'bold 13px system-ui';
      ctx.fillText('✔ ' + f.product, cx + 6, 264); }

    // Furnace body + flame.
    const bx = cx - 60, by = 300, bw = 120, bh = 90;
    ctx.save();
    rrect(ctx, bx, by, bw, bh, 8); ctx.fillStyle = '#3a2318'; ctx.fill(); ctx.clip();
    // Brick courses (pixel-art masonry), offset every other row.
    const brW = 24, brH = 12;
    for (let ry = 0, row = 0; ry < bh; ry += brH, row++) {
      const off = row % 2 ? -brW / 2 : 0;
      for (let rx = -brW; rx < bw + brW; rx += brW) {
        const px = bx + rx + off, py = by + ry;
        ctx.fillStyle = (row + (rx / brW | 0)) % 3 ? '#6e4130' : '#7d4a35';
        ctx.fillRect(px + 1, py + 1, brW - 2, brH - 2);
        ctx.fillStyle = '#8a5640'; ctx.fillRect(px + 1, py + 1, brW - 2, 2); // top highlight
      }
    }
    ctx.restore();
    ctx.strokeStyle = '#20160f'; ctx.lineWidth = 3; rrect(ctx, bx, by, bw, bh, 8); ctx.stroke();
    // dark hearth opening the flame sits inside
    ctx.fillStyle = '#180d07';
    rrect(ctx, bx + 15, by + 28, bw - 30, bh - 30, 7); ctx.fill();
    // mouth glow
    const heat = clamp(f.temp / 100, 0, 1.3);
    const fg = ctx.createLinearGradient(0, by + bh, 0, by + 20);
    const hot = f.temp > f.bandMax;
    fg.addColorStop(0, hot ? '#fff3c0' : '#ff9a3c');
    fg.addColorStop(1, `rgba(255,80,0,${0.15 + heat * 0.5})`);
    ctx.fillStyle = fg;
    const fl = 20 + heat * 44;
    ctx.beginPath();
    for (let i = 0; i <= 6; i++) {
      const px = bx + 14 + (i / 6) * (bw - 28);
      const wob = Math.sin(state.t * 12 + i + f.id) * 6 * heat;
      const py = by + bh - 10 - (i % 2 ? fl : fl * 0.7) - wob;
      i === 0 ? ctx.moveTo(px, by + bh - 8) : ctx.lineTo(px, py);
    }
    ctx.lineTo(bx + bw - 14, by + bh - 8); ctx.closePath(); ctx.fill();
    if (f.overheat > 55) {  // danger pulse
      ctx.strokeStyle = `rgba(255,40,40,${0.3 + 0.4 * Math.abs(Math.sin(state.t * 10))})`;
      ctx.lineWidth = 4; rrect(ctx, bx - 3, by - 3, bw + 6, bh + 6, 10); ctx.stroke();
    }
    if (f.flash > 0) {  // boil-over flash
      ctx.fillStyle = `rgba(255,${f.acid ? 255 : 180},120,${f.flash})`;
      rrect(ctx, bx - 10, by - 30, bw + 20, bh + 40, 12); ctx.fill();
    }

    // Bellows (compresses when pumped).
    const pumper = state.workers.find((w) => w.furnace === f.id && w.ko <= 0);
    const squeeze = pumper ? (0.5 + 0.5 * Math.abs(Math.sin(state.t * 9 + f.id))) : 0.15;
    const bey = 396, beh = 30 - squeeze * 14;
    ctx.fillStyle = '#7a5a3a';
    ctx.beginPath();
    ctx.moveTo(cx - 34, bey + 30); ctx.lineTo(cx + 34, bey + 30);
    ctx.lineTo(cx + 20, bey + 30 - beh); ctx.lineTo(cx - 20, bey + 30 - beh);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#4a3624'; ctx.fillRect(cx + 30, bey + 20, 26, 8); // nozzle

    // Quench button.
    const q = geo.quench;
    const cd = f.quenchCd > 0;
    rrect(ctx, q.x, q.y, q.w, q.h, 8);
    ctx.fillStyle = cd ? '#20303a' : '#2f5c74'; ctx.fill();
    ctx.strokeStyle = cd ? '#2a3f4a' : '#4aa6c8'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = cd ? '#6f8a97' : '#dff3fb'; ctx.font = 'bold 13px system-ui';
    ctx.fillText(cd ? `❄ ${f.quenchCd.toFixed(1)}s` : '❄ Quench', cx, q.y + 22);
  }

  function drawApparatus(ctx, f, x, y) {
    ctx.save(); ctx.translate(x, y);
    ctx.strokeStyle = '#bfe3ff'; ctx.fillStyle = 'rgba(150,200,255,0.18)'; ctx.lineWidth = 2;
    if (f.name === 'Retort') {
      ctx.beginPath(); ctx.arc(-6, 6, 12, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(4, 0); ctx.quadraticCurveTo(26, 2, 30, 16); ctx.stroke();
    } else if (f.cradle) {
      ctx.beginPath(); ctx.ellipse(0, 6, 13, 15, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#c9a6ff'; ctx.font = '14px system-ui'; ctx.textAlign = 'center';
      ctx.fillText('⚗', 0, 12);
    } else if (f.name === 'Aludel') {
      ctx.beginPath(); ctx.moveTo(-11, 16); ctx.lineTo(11, 16); ctx.lineTo(6, -8);
      ctx.lineTo(-6, -8); ctx.closePath(); ctx.fill(); ctx.stroke();
    } else { // Alembic
      ctx.beginPath(); ctx.arc(0, 8, 12, 0, Math.PI); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-12, 8); ctx.lineTo(-12, -2);
      ctx.lineTo(12, -2); ctx.lineTo(12, 8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(0, -16); ctx.lineTo(16, -12); ctx.stroke();
    }
    ctx.restore();
  }

  function drawWorker(ctx, state, w, L, selected) {
    const pos = L.workers.find((p) => p.id === w.id);
    const ko = w.ko > 0;
    const hom = w.kind === 'homunculus';
    const scale = 2.4, sw = GNOME[0].length * scale, sh = GNOME.length * scale;
    const wob = hom && !ko ? Math.sin(state.t * 16 + w.id) * 2 : 0;
    const x = pos.x + wob;
    const footY = pos.y + 24;          // sprite stands with boots near here
    const cy = footY - sh / 2;

    if (selected === w.id) {           // selection halo
      ctx.strokeStyle = '#ffd84a'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(pos.x, cy, sw * 0.7, 0, Math.PI * 2); ctx.stroke();
    }

    if (ko) {                          // knocked out: tip the sprite over, X eyes
      ctx.save(); ctx.translate(x, cy); ctx.rotate(1.3);
      drawSprite(ctx, GNOME, hom ? HOM_PAL : GNOME_PAL, 0, sh / 2, scale);
      ctx.restore();
      ctx.fillStyle = '#ff5555'; ctx.font = 'bold 12px system-ui'; ctx.textAlign = 'center';
      ctx.fillText('✕✕', x, cy - 2);
    } else {
      drawSprite(ctx, GNOME, hom ? HOM_PAL : GNOME_PAL, x, footY, scale);
      if (hom) {                       // glass dome over the homunculus
        ctx.strokeStyle = 'rgba(190,230,255,0.65)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(x, cy - 2, sw * 0.52, Math.PI * 1.05, Math.PI * 1.95); ctx.stroke();
      }
      if (w.winded) {                  // sweat bead
        ctx.fillStyle = '#7fd0ff';
        ctx.beginPath(); ctx.arc(x + sw * 0.4, cy - sh * 0.15, 3, 0, 6.3); ctx.fill();
      }
    }

    // status bars + name
    const by = footY + 4;
    if (!ko) {
      if (hom) bar(ctx, pos.x - 16, by, 32, 4, w.destabilize / 100, '#b57bff', '#2a1840');
      else bar(ctx, pos.x - 16, by, 32, 4, w.stamina / 100,
        w.winded ? '#ff7a1a' : '#7fd0ff', '#20303a');
    }
    ctx.fillStyle = ko ? '#ff6b6b' : '#cbb8cb';
    ctx.font = '10px system-ui'; ctx.textAlign = 'center';
    ctx.fillText(ko ? `KO ${w.ko.toFixed(0)}s` : w.name, pos.x, by + 14);
  }

  function bar(ctx, x, y, w, h, frac, fg, bg) {
    ctx.fillStyle = bg; rrect(ctx, x, y, w, h, 2); ctx.fill();
    ctx.fillStyle = fg; rrect(ctx, x, y, w * clamp(frac, 0, 1), h, 2); ctx.fill();
  }

  function drawHud(ctx, state, opts) {
    ctx.textAlign = 'left';
    // integrity
    ctx.fillStyle = '#e8dfe8'; ctx.font = 'bold 13px system-ui';
    ctx.fillText('Lab integrity', 18, 22);
    bar(ctx, 18, 28, 190, 12, state.integrity / 100,
      state.integrity > 40 ? '#39d353' : '#ff3b30', '#20303a');
    ctx.fillStyle = '#cbb8cb'; ctx.font = '12px system-ui';
    ctx.fillText(`${state.integrity | 0}%`, 214, 39);
    // right side
    ctx.textAlign = 'right';
    ctx.fillStyle = '#cbb8cb';
    ctx.fillText(`⏱ ${state.t.toFixed(1)}s`, W - 18, 22);
    ctx.fillText(`🧪 homunculi: ${state.homunculiBirthed}`, W - 18, 40);
    if (opts.mode) {
      ctx.fillStyle = '#8a7f8a';
      ctx.fillText(opts.mode.toUpperCase() + (opts.tick != null ? ` · tick ${opts.tick}` : ''),
        W - 18, 58);
    }
    ctx.textAlign = 'left';
  }

  function drawMessages(ctx, state) {
    const msgs = state.messages.slice(-4);
    ctx.font = '12px system-ui'; ctx.textAlign = 'left';
    msgs.forEach((m, i) => {
      ctx.fillStyle = m.tone === 'good' ? '#7fe08a' : m.tone === 'bad' ? '#ff8a7a' : '#b7a9b7';
      ctx.fillText(m.text, 18, 512 + i * 20);
    });
  }

  function drawBanner(ctx, state) {
    ctx.fillStyle = 'rgba(0,0,0,0.62)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    const won = state.status === 'won';
    ctx.fillStyle = won ? '#7fe08a' : '#ff6b6b';
    ctx.font = 'bold 44px system-ui';
    ctx.fillText(won ? 'THE WORK IS COMPLETE' : 'THE LAB IS LOST', W / 2, H / 2 - 12);
    ctx.fillStyle = '#e8dfe8'; ctx.font = '18px system-ui';
    ctx.fillText(won ? `Score ${state.score} · ${state.t.toFixed(1)}s · ${state.homunculiBirthed} homunculi`
      : 'The puffers flee into the night.', W / 2, H / 2 + 24);
    ctx.fillStyle = '#b7a9b7'; ctx.font = '14px system-ui';
    ctx.fillText('Press R or “Restart” to try again.', W / 2, H / 2 + 54);
    ctx.textAlign = 'left';
  }

  function drawPaused(ctx) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center'; ctx.fillStyle = '#ffd84a'; ctx.font = 'bold 40px system-ui';
    ctx.fillText('⏸ PAUSED', W / 2, H / 2 - 6);
    ctx.fillStyle = '#e8dfe8'; ctx.font = '15px system-ui';
    ctx.fillText('Reassign your gnomes, then press Space to resume.', W / 2, H / 2 + 26);
    ctx.textAlign = 'left';
  }

  const API = { draw, hitTest, layout, W, H };
  global.PuffersRender = API;
  if (typeof module !== 'undefined' && module.exports) module.exports = API;
})(typeof window !== 'undefined' ? window : globalThis);
</script>
<script>/* Puffers — shell: canvas setup, input, controls, the three time-loops, and the
 * on-screen how-to-play overlay.
 *
 * The ONLY real gameplay difference between the genre variants lives here:
 *   realtime  — sim advances every animation frame; no pause.
 *   pausable  — same, but Space freezes it so you can reassign in calm.
 *   tick      — sim is frozen until you press Step (0.5s); “Run” auto-steps.
 */
(function (global) {
  'use strict';
  const Sim = global.PuffersSim, Render = global.PuffersRender;
  const TICK_DT = 0.5, RUN_EVERY = 0.55; // tick variant: sim-seconds per step, real gap

  const MODE_NOTE = {
    pausable: 'This is the <b>Pausable</b> prototype — press <kbd>Space</kbd> anytime to ' +
      'freeze the lab and reassign gnomes in calm, then <kbd>Space</kbd> to resume.',
    realtime: 'This is the <b>Real-time</b> prototype — the heat never stops draining and ' +
      'you <b>cannot pause</b>. Pure scramble.',
    tick: 'This is the <b>Tick</b> prototype — nothing moves until you press <b>▶ Step</b> ' +
      '(½ second). Plan, step, watch, repeat — or press <b>▶▶ Run</b> to auto-advance.',
  };

  function overlayHTML(mode) {
    return '<div class="puffers-card">' +
      '<div class="puffers-eyebrow">Alchemical bellows-juggling</div>' +
      '<h2>How to play</h2>' +
      '<p class="puffers-goal">🎯 <b>Goal:</b> finish the three processes — <b>Alembic</b>, ' +
      '<b>Retort</b> and <b>Aludel</b> — by keeping each furnace inside its ' +
      '<span class="g">green band</span>. You <b>lose</b> if lab integrity hits 0.</p>' +
      '<ul>' +
      '<li><b>Pick up a gnome</b> (click it), then <b>click a furnace</b> to send it to the ' +
      'bellows — it jumps up and down to pump heat.</li>' +
      '<li><b>Watch the thermometer.</b> Too cold → the process stalls. Too hot → it ' +
      '<b>boils over</b>: lab damage, fumes that knock the gnome out, and it splashes onto ' +
      'the neighbouring furnaces.</li>' +
      '<li><b>Gnomes tire.</b> A winded gnome barely puffs — rest it by clicking it back to ' +
      'the bench up top.</li>' +
      '<li><b>❄ Quench</b> cools a furnace fast (short cooldown) to pull it back from the brink.</li>' +
      '<li><b>The Cradle</b> grows a <b>Homunculus</b>: a tireless, fume-proof helper — but ' +
      'it slowly destabilises and eventually pops.</li>' +
      '</ul>' +
      '<p class="puffers-mode">' + MODE_NOTE[mode] + '</p>' +
      '<button class="puffers-play">▶ Play</button>' +
      '</div>';
  }

  function boot(mode) {
    mode = mode || 'pausable';
    const root = document.getElementById('app') || document.body;

    const wrap = document.createElement('div'); wrap.className = 'puffers-wrap';
    const canvas = document.createElement('canvas'); canvas.className = 'puffers-canvas';
    const bar = document.createElement('div'); bar.className = 'puffers-bar';
    const hint = document.createElement('div'); hint.className = 'puffers-hint';
    const overlay = document.createElement('div'); overlay.className = 'puffers-overlay';
    overlay.innerHTML = overlayHTML(mode);
    wrap.appendChild(bar); wrap.appendChild(canvas); wrap.appendChild(overlay);
    wrap.appendChild(hint);
    root.appendChild(wrap);

    const ctx = canvas.getContext('2d');
    function fitCanvas() {
      const dpr = Math.min(global.devicePixelRatio || 1, 2);
      const cssW = Math.min(Render.W, wrap.clientWidth || Render.W);
      const cssH = cssW * (Render.H / Render.W);
      canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
      canvas.width = Math.round(Render.W * dpr); canvas.height = Math.round(Render.H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    global.addEventListener('resize', fitCanvas);

    let state, selected, paused, running, runAccum, lastNow, tickCount, started;
    function seedFromUrl() {
      const m = /[?&]seed=(\d+)/.exec(global.location.search);
      return m ? parseInt(m[1], 10) : Math.floor(Math.random() * 1e9);
    }
    let seed = seedFromUrl();

    function reset(newSeed) {
      if (newSeed != null) seed = newSeed;
      state = Sim.createState(seed);
      selected = null; runAccum = 0; tickCount = 0;
      paused = false; running = false; lastNow = null;
      syncBar();
    }

    // ---- Intro / help overlay --------------------------------------------
    function showIntro() { overlay.classList.remove('hidden'); if (mode !== 'realtime') paused = true; syncBar(); }
    function hideIntro() { overlay.classList.add('hidden'); }
    overlay.querySelector('.puffers-play').addEventListener('click', () => {
      hideIntro(); started = true; paused = false; lastNow = null; syncBar();
    });

    // ---- Input ------------------------------------------------------------
    function toLogical(ev) {
      const r = canvas.getBoundingClientRect();
      const p = ev.touches ? ev.touches[0] : ev;
      return { x: (p.clientX - r.left) / r.width * Render.W,
        y: (p.clientY - r.top) / r.height * Render.H };
    }
    function onDown(ev) {
      if (!overlay.classList.contains('hidden')) return; // overlay swallows input
      ev.preventDefault();
      if (state.status !== 'playing') return;
      const { x, y } = toLogical(ev);
      const hit = Render.hitTest(state, x, y);
      if (hit.type === 'worker') selected = (selected === hit.id) ? null : hit.id;
      else if (hit.type === 'quench') Sim.quench(state, hit.id);
      else if (hit.type === 'assign') { if (selected != null) { Sim.assign(state, selected, hit.id); selected = null; } }
      else if (hit.type === 'bench') { if (selected != null) { Sim.unassign(state, selected); selected = null; } }
      if (mode === 'tick') draw();
    }
    canvas.addEventListener('mousedown', onDown);
    canvas.addEventListener('touchstart', onDown, { passive: false });

    global.addEventListener('keydown', (e) => {
      if (e.code === 'KeyR') { reset(); return; }
      if (e.code === 'Space') {
        e.preventDefault();
        if (!overlay.classList.contains('hidden')) { hideIntro(); started = true; paused = false; syncBar(); return; }
        if (mode === 'pausable') { paused = !paused; syncBar(); }
        else if (mode === 'tick') stepOnce();
      }
    });

    // ---- Controls ---------------------------------------------------------
    let pauseBtn, runBtn;
    function mkBtn(label, fn) {
      const b = document.createElement('button'); b.textContent = label;
      b.className = 'puffers-btn'; b.onclick = fn; bar.appendChild(b); return b;
    }
    function buildBar() {
      bar.innerHTML = '';
      const title = document.createElement('span'); title.className = 'puffers-title';
      title.textContent = 'PUFFERS · ' + mode; bar.appendChild(title);
      const goal = document.createElement('span'); goal.className = 'puffers-goalchip';
      goal.textContent = 'Goal: finish 3 processes · keep the lab intact'; bar.appendChild(goal);
      if (mode === 'pausable') pauseBtn = mkBtn('⏸ Pause', () => { paused = !paused; syncBar(); });
      if (mode === 'tick') {
        mkBtn('▶ Step', stepOnce);
        mkBtn('⏩ ×3', () => { for (let i = 0; i < 3; i++) stepOnce(); });
        runBtn = mkBtn('▶▶ Run', () => { running = !running; runAccum = 0; syncBar(); });
      }
      mkBtn('↻ Restart', () => reset());
      mkBtn('🎲 New seed', () => reset(Math.floor(Math.random() * 1e9)));
      mkBtn('❔ How to play', showIntro);
    }
    function syncBar() {
      if (pauseBtn) pauseBtn.textContent = paused ? '▶ Resume' : '⏸ Pause';
      if (runBtn) runBtn.textContent = running ? '⏸ Stop' : '▶▶ Run';
    }
    function setHint() {
      const common = 'Click a gnome, then click a furnace to send it to the bellows. ' +
        '❄ Quench cools a furnace before it boils over. Keep each thermometer in the green band.';
      const perMode = {
        realtime: ' Real-time: heat is always draining — no pausing, keep moving!',
        pausable: ' Pausable: press Space to freeze and reassign, Space again to resume.',
        tick: ' Tick: nothing moves until you press Step. Plan, step, watch — or hit Run.',
      };
      hint.textContent = common + (perMode[mode] || '');
    }

    function stepOnce() {
      if (!started || state.status !== 'playing') return;
      Sim.step(state, TICK_DT); tickCount++; draw();
    }

    // ---- Loop -------------------------------------------------------------
    function frame(now) {
      if (lastNow == null) lastNow = now;
      let dt = (now - lastNow) / 1000; lastNow = now;
      dt = Math.min(dt, 0.05);
      const live = started && overlay.classList.contains('hidden') && state.status === 'playing';
      if (live) {
        if (mode === 'realtime') Sim.step(state, dt);
        else if (mode === 'pausable') { if (!paused) Sim.step(state, dt); }
        else if (mode === 'tick' && running) {
          runAccum += dt;
          if (runAccum >= RUN_EVERY) { runAccum = 0; Sim.step(state, TICK_DT); tickCount++; }
        }
      }
      draw();
      global.requestAnimationFrame(frame);
    }

    function draw() {
      Render.draw(ctx, state, {
        selected, mode,
        paused: mode === 'pausable' ? (paused && started) : false,
        tick: mode === 'tick' ? tickCount : null,
      });
    }

    started = false;
    buildBar(); setHint(); reset(); fitCanvas(); showIntro();
    global.requestAnimationFrame(frame);
  }

  global.Puffers = { boot };
})(typeof window !== 'undefined' ? window : globalThis);
</script>
<script>Puffers.boot("tick");</script>
